version: 2

unit_tests:
  - name: int_identity_links__filtered__applies_deterministic_veto_and_orientation
    model: int_identity_links__filtered
    given:
      - input: ref('int_identity_link_candidates')
        format: sql
        rows: |
          select 'ip_address' as key_name, '203.0.113.1' as key_value, 'probabilistic' as tier, 'anon_a' as anonymous_id_a, 'anon_b' as anonymous_id_b, timestamp('2026-01-01 08:00:00+00') as first_key_seen_at_a, timestamp('2026-01-01 08:00:00+00') as last_key_seen_at_a, timestamp('2026-01-01 08:00:00+00') as first_key_seen_at_b, timestamp('2026-01-01 08:00:00+00') as last_key_seen_at_b
          union all
          select 'ip_address' as key_name, '203.0.113.2' as key_value, 'probabilistic' as tier, 'anon_c' as anonymous_id_a, 'anon_d' as anonymous_id_b, timestamp('2026-01-02 08:00:00+00') as first_key_seen_at_a, timestamp('2026-01-02 08:00:00+00') as last_key_seen_at_a, timestamp('2026-01-02 08:00:00+00') as first_key_seen_at_b, timestamp('2026-01-02 08:00:00+00') as last_key_seen_at_b
          union all
          select 'user_id' as key_name, 'user_3' as key_value, 'deterministic' as tier, 'anon_e' as anonymous_id_a, 'anon_f' as anonymous_id_b, timestamp('2026-01-03 08:00:00+00') as first_key_seen_at_a, timestamp('2026-01-03 08:00:00+00') as last_key_seen_at_a, timestamp('2026-01-03 08:00:00+00') as first_key_seen_at_b, timestamp('2026-01-03 08:00:00+00') as last_key_seen_at_b
      - input: ref('int_identity_link_deterministic_value_sets')
        format: sql
        rows: |
          select 'user_id' as key_name, 'anon_a' as anonymous_id, '["user_1"]' as key_value_set
          union all
          select 'user_id' as key_name, 'anon_b' as anonymous_id, '["user_2"]' as key_value_set
          union all
          select 'user_id' as key_name, 'anon_c' as anonymous_id, '["user_1"]' as key_value_set
          union all
          select 'user_id' as key_name, 'anon_e' as anonymous_id, '["user_3"]' as key_value_set
          union all
          select 'user_id' as key_name, 'anon_f' as anonymous_id, '["user_3"]' as key_value_set
      - input: ref('int_identity_anonymous_id_first_seen')
        format: sql
        rows: |
          select 'anon_a' as anonymous_id, timestamp('2026-01-03 08:00:00+00') as first_seen_at, date '2026-01-03' as first_seen_date
          union all
          select 'anon_b' as anonymous_id, timestamp('2026-01-01 08:00:00+00') as first_seen_at, date '2026-01-01' as first_seen_date
          union all
          select 'anon_c' as anonymous_id, timestamp('2026-01-04 08:00:00+00') as first_seen_at, date '2026-01-04' as first_seen_date
          union all
          select 'anon_d' as anonymous_id, timestamp('2026-01-02 08:00:00+00') as first_seen_at, date '2026-01-02' as first_seen_date
          union all
          select 'anon_e' as anonymous_id, timestamp('2026-01-01 09:00:00+00') as first_seen_at, date '2026-01-01' as first_seen_date
          union all
          select 'anon_f' as anonymous_id, timestamp('2026-01-01 10:00:00+00') as first_seen_at, date '2026-01-01' as first_seen_date
    expect:
      rows:
        - source_anonymous_id: anon_c
          target_anonymous_id: anon_d
          key_name: ip_address
          key_value: 203.0.113.2
          tier: probabilistic
          source_first_seen_at: "2026-01-04 08:00:00+00"
          target_first_seen_at: "2026-01-02 08:00:00+00"
          source_first_seen_date: "2026-01-04"
          target_first_seen_date: "2026-01-02"
        - source_anonymous_id: anon_f
          target_anonymous_id: anon_e
          key_name: user_id
          key_value: user_3
          tier: deterministic
          source_first_seen_at: "2026-01-01 10:00:00+00"
          target_first_seen_at: "2026-01-01 09:00:00+00"
          source_first_seen_date: "2026-01-01"
          target_first_seen_date: "2026-01-01"
