version: 2

unit_tests:
  - name: int_identity_link_candidates__filters_skew_and_date_gap
    model: int_identity_link_candidates
    given:
      - input: ref('int_identity_link_key_spans')
        format: sql
        rows: |
          select 'source' as scope, 'web' as scope_value, 'ip_address' as key_name, '203.0.113.1' as key_value, 'anon_a' as anonymous_id, 'probabilistic' as tier, 3 as window_days, 100 as max_distinct_anonymous_ids, date '2026-01-01' as first_key_seen_date, date '2026-01-01' as last_key_seen_date
          union all
          select 'source' as scope, 'web' as scope_value, 'ip_address' as key_name, '203.0.113.1' as key_value, 'anon_b' as anonymous_id, 'probabilistic' as tier, 3 as window_days, 100 as max_distinct_anonymous_ids, date '2026-01-04' as first_key_seen_date, date '2026-01-04' as last_key_seen_date
          union all
          select 'source' as scope, 'web' as scope_value, 'ip_address' as key_name, '203.0.113.2' as key_value, 'anon_c' as anonymous_id, 'probabilistic' as tier, 3 as window_days, 100 as max_distinct_anonymous_ids, date '2026-01-01' as first_key_seen_date, date '2026-01-01' as last_key_seen_date
          union all
          select 'source' as scope, 'web' as scope_value, 'ip_address' as key_name, '203.0.113.2' as key_value, 'anon_d' as anonymous_id, 'probabilistic' as tier, 3 as window_days, 100 as max_distinct_anonymous_ids, date '2026-01-10' as first_key_seen_date, date '2026-01-10' as last_key_seen_date
          union all
          select 'source' as scope, 'web' as scope_value, 'ip_address' as key_name, '203.0.113.3' as key_value, 'anon_e' as anonymous_id, 'probabilistic' as tier, 3 as window_days, 2 as max_distinct_anonymous_ids, date '2026-01-01' as first_key_seen_date, date '2026-01-01' as last_key_seen_date
          union all
          select 'source' as scope, 'web' as scope_value, 'ip_address' as key_name, '203.0.113.3' as key_value, 'anon_f' as anonymous_id, 'probabilistic' as tier, 3 as window_days, 2 as max_distinct_anonymous_ids, date '2026-01-01' as first_key_seen_date, date '2026-01-01' as last_key_seen_date
          union all
          select 'source' as scope, 'web' as scope_value, 'ip_address' as key_name, '203.0.113.3' as key_value, 'anon_g' as anonymous_id, 'probabilistic' as tier, 3 as window_days, 2 as max_distinct_anonymous_ids, date '2026-01-01' as first_key_seen_date, date '2026-01-01' as last_key_seen_date
    expect:
      rows:
        - scope: source
          scope_value: web
          key_name: ip_address
          key_value: 203.0.113.1
          tier: probabilistic
          anonymous_id_a: anon_a
          anonymous_id_b: anon_b
          first_key_seen_date_a: "2026-01-01"
          last_key_seen_date_a: "2026-01-01"
          first_key_seen_date_b: "2026-01-04"
          last_key_seen_date_b: "2026-01-04"
