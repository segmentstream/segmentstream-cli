# Agentic-experience (AX) regression via axprobe. Drives the .axprobe/ scenarios
# and fails if a scenario misses its `expect` bar.
#
# Manual to start (workflow_dispatch). Add `pull_request: {}` to gate PRs once the
# team is ready.
#
# Required repository secrets:
#   OPENROUTER_API_KEY  - drives the agent (https://openrouter.ai/keys); spends credits per run
#   AXPROBE_TOKEN       - PAT with read access to the private segmentstream/axprobe repo
#                         (GITHUB_TOKEN is repo-scoped and cannot clone another repo;
#                          if axprobe is made public, drop this and use `go install`).
name: axprobe AX

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ax:
    runs-on: ubuntu-latest # ubuntu runners have Docker natively (no nesting needed)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build axprobe
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.AXPROBE_TOKEN }}@github.com/segmentstream/axprobe.git" \
            "$RUNNER_TEMP/axprobe-src"
          (cd "$RUNNER_TEMP/axprobe-src" && go build -o "$RUNNER_TEMP/axprobe" .)
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Run AX scenarios (.axprobe/*.yaml)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: axprobe run --unattended --model moonshotai/kimi-k2.6

      - name: Upload AX reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ax-reports
          path: "*.report.json"
