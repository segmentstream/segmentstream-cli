version: 2

project_name: segmentstream

builds:
  - id: segmentstream
    main: ./cmd/segmentstream
    binary: segmentstream
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/segmentstream/segmentstream-cli/cli/internal/version.Version={{ .Version }}
      - -X github.com/segmentstream/segmentstream-cli/cli/internal/version.Commit={{ .Commit }}
      - -X github.com/segmentstream/segmentstream-cli/cli/internal/version.Date={{ .Date }}
      - -X github.com/segmentstream/segmentstream-cli/cli/internal/warehouse/bigquery/googleoauth.desktopClientID={{ .Env.SEGMENTSTREAM_GOOGLE_OAUTH_CLIENT_ID }}
      - -X github.com/segmentstream/segmentstream-cli/cli/internal/warehouse/bigquery/googleoauth.desktopClientSecret={{ .Env.SEGMENTSTREAM_GOOGLE_OAUTH_CLIENT_SECRET }}

archives:
  - id: segmentstream
    ids:
      - segmentstream
    formats:
      - tar.gz
    name_template: "segmentstream_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: segmentstream
    name: segmentstream
  mode: keep-existing
  replace_existing_artifacts: true
  extra_files:
    - glob: ./install.sh

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
