version: 2

models:
  - name: events
    description: Canonical SegmentStream event stream composed from declared sources.
    config:
      tags:
        - segmentstream_core
        - segmentstream_mart
        - segmentstream_partitioned
      meta:
        segmentstream:
          export_name: events
          contract:
            type: events
            schema_version: 1
    columns:
      - name: segmentstream_source
        description: Source name from segmentstream.yml.
      - name: event_id
        description: Stable event identifier from the upstream source.
        data_tests:
          - not_null
      - name: anonymous_id
        description: Anonymous user or device identifier.
      - name: event_name
        description: Event name.
      - name: page_url
        description: Page URL associated with the event when available.
      - name: page_referrer
        description: Referrer URL associated with the event when available.
      - name: event_timestamp
        description: Event timestamp in UTC.
      - name: event_date
        description: Date partition for this event row.

  - name: identity_keys
    description: Canonical SegmentStream identity key stream composed from declared identity key sources.
    config:
      tags:
        - segmentstream_core
        - segmentstream_mart
        - segmentstream_partitioned
      meta:
        segmentstream:
          export_name: identity_keys
          contract:
            type: identity_keys
            schema_version: 1
    columns:
      - name: segmentstream_source
        description: Source name from segmentstream.yml.
      - name: date
        description: Date partition for this identity key observation.
        data_tests:
          - not_null
      - name: anonymous_id
        description: Anonymous user or device identifier.
        data_tests:
          - not_null
      - name: key_name
        description: Identity key type.
        data_tests:
          - not_null
      - name: key_value
        description: Normalized identity key value.
        data_tests:
          - not_null

  - name: identity_links
    description: Canonical SegmentStream identity link edge table generated from configured identity key rules.
    config:
      tags:
        - segmentstream_core
        - segmentstream_mart
        - segmentstream_unpartitioned
      meta:
        segmentstream:
          export_name: identity_links
          contract:
            type: identity_links
            schema_version: 1
    columns:
      - name: source_anonymous_id
        description: Later first-seen anonymous ID in the link.
        data_tests:
          - not_null
      - name: target_anonymous_id
        description: Earlier first-seen anonymous ID in the link.
        data_tests:
          - not_null
      - name: key_name
        description: Configured identity key type that created the link.
        data_tests:
          - not_null
      - name: key_value
        description: Normalized key value shared by both anonymous IDs.
        data_tests:
          - not_null
      - name: tier
        description: Link tier from segmentstream.yml, either deterministic or probabilistic.
        data_tests:
          - not_null
      - name: source_first_seen_date
        description: First date the source anonymous ID appeared in identity_keys.
        data_tests:
          - not_null
      - name: target_first_seen_date
        description: First date the target anonymous ID appeared in identity_keys.
        data_tests:
          - not_null

  - name: identities
    description: Flat SegmentStream identity map resolved from identity links.
    config:
      tags:
        - segmentstream_core
        - segmentstream_mart
        - segmentstream_unpartitioned
      meta:
        segmentstream:
          export_name: identities
          contract:
            type: identities
            schema_version: 1
    columns:
      - name: anonymous_id
        description: Anonymous user or device identifier.
        data_tests:
          - not_null
          - unique
      - name: identity_id
        description: Stable identity ID for the connected identity component.
        data_tests:
          - not_null
      - name: first_seen_date
        description: First date this anonymous ID appeared in identity_keys.
        data_tests:
          - not_null
