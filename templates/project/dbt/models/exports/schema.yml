version: 2

models:
  - name: events
    description: Canonical SegmentStream event stream composed from declared sources.
    config:
      tags:
        - segmentstream_core
        - segmentstream_export
      meta:
        segmentstream:
          export_name: events
          contract: events_v1
    columns:
      - name: segmentstream_source
        description: Source name from segmentstream.yml.
        data_tests:
          - not_null
      - name: source_event_id
        description: Stable event identifier from the upstream source when available.
      - name: anonymous_id
        description: Anonymous user or device identifier.
      - name: user_id
        description: Authenticated user identifier when available.
      - name: event_name
        description: Event name.
      - name: event_timestamp
        description: Event timestamp in UTC.
      - name: event_date
        description: Date partition for this event row.
        data_tests:
          - not_null
