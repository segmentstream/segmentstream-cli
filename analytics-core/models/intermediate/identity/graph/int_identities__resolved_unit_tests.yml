version: 2

unit_tests:
  - name: int_identities__resolved__applies_phase_fallbacks
    model: int_identities__resolved
    overrides:
      vars:
        segmentstream_identity_graph_max_component_size: 64
        segmentstream_identity_graph_max_deterministic_component_size: 200
    given:
      - input: ref('int_identity_graph_nodes')
        format: sql
        rows: |
          select 'anon_a' as anonymous_id, timestamp('2026-01-01 08:00:00+00') as first_seen_at, date '2026-01-01' as first_seen_date
          union all
          select 'anon_b' as anonymous_id, timestamp('2026-01-02 08:00:00+00') as first_seen_at, date '2026-01-02' as first_seen_date
          union all
          select 'anon_c' as anonymous_id, timestamp('2026-01-03 08:00:00+00') as first_seen_at, date '2026-01-03' as first_seen_date
          union all
          select 'anon_d' as anonymous_id, timestamp('2026-01-04 08:00:00+00') as first_seen_at, date '2026-01-04' as first_seen_date
          union all
          select 'anon_e' as anonymous_id, timestamp('2026-01-05 08:00:00+00') as first_seen_at, date '2026-01-05' as first_seen_date
          union all
          select 'anon_f' as anonymous_id, timestamp('2026-01-06 08:00:00+00') as first_seen_at, date '2026-01-06' as first_seen_date
      - input: ref('int_identity_graph_deterministic_components')
        format: sql
        rows: |
          select 'anon_a' as anonymous_id, 'cc_1' as connected_component_id, 2 as component_size, 'anon_a' as identity_id
          union all
          select 'anon_b' as anonymous_id, 'cc_1' as connected_component_id, 2 as component_size, 'anon_a' as identity_id
          union all
          select 'anon_c' as anonymous_id, 'cc_2' as connected_component_id, 2 as component_size, 'anon_d' as identity_id
          union all
          select 'anon_d' as anonymous_id, 'cc_2' as connected_component_id, 2 as component_size, 'anon_d' as identity_id
          union all
          select 'anon_e' as anonymous_id, 'cc_3' as connected_component_id, 201 as component_size, 'anon_c' as identity_id
      - input: ref('int_identity_graph_all_components')
        format: sql
        rows: |
          select 'anon_a' as anonymous_id, 'cc_all_1' as connected_component_id, 2 as component_size, 'anon_b' as identity_id
          union all
          select 'anon_b' as anonymous_id, 'cc_all_1' as connected_component_id, 2 as component_size, 'anon_b' as identity_id
          union all
          select 'anon_c' as anonymous_id, 'cc_all_2' as connected_component_id, 65 as component_size, 'anon_c' as identity_id
          union all
          select 'anon_d' as anonymous_id, 'cc_all_2' as connected_component_id, 65 as component_size, 'anon_c' as identity_id
          union all
          select 'anon_e' as anonymous_id, 'cc_all_3' as connected_component_id, 65 as component_size, 'anon_c' as identity_id
    expect:
      rows:
        - anonymous_id: anon_a
          identity_id: anon_b
          first_seen_at: "2026-01-01 08:00:00+00"
          first_seen_date: "2026-01-01"
        - anonymous_id: anon_b
          identity_id: anon_b
          first_seen_at: "2026-01-02 08:00:00+00"
          first_seen_date: "2026-01-02"
        - anonymous_id: anon_c
          identity_id: anon_d
          first_seen_at: "2026-01-03 08:00:00+00"
          first_seen_date: "2026-01-03"
        - anonymous_id: anon_d
          identity_id: anon_d
          first_seen_at: "2026-01-04 08:00:00+00"
          first_seen_date: "2026-01-04"
        - anonymous_id: anon_e
          identity_id: anon_e
          first_seen_at: "2026-01-05 08:00:00+00"
          first_seen_date: "2026-01-05"
        - anonymous_id: anon_f
          identity_id: anon_f
          first_seen_at: "2026-01-06 08:00:00+00"
          first_seen_date: "2026-01-06"
