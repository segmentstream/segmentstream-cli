name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Check installer syntax
        run: sh -n install.sh

      - name: Test
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: cli
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEGMENTSTREAM_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.SEGMENTSTREAM_GOOGLE_OAUTH_CLIENT_ID }}
          SEGMENTSTREAM_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.SEGMENTSTREAM_GOOGLE_OAUTH_CLIENT_SECRET }}
