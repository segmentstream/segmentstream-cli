type: identity_keys
schema_version: 2
description: Timestamped identity key observations emitted by a custom source package.
default: false
status: supported
model:
  name: identity_keys
  partition: date
columns:
  - name: date
    type: DATE
    required: true
    description: UTC date partition for this identity key observation.
  - name: observed_at
    type: TIMESTAMP
    required: true
    description: UTC timestamp when this identity key was observed.
  - name: anonymous_id
    type: STRING
    required: true
    description: Anonymous user or device identifier.
  - name: key_name
    type: STRING
    required: true
    description: Identity key type, for example user_id, email_hash, click_id, or ip_address.
  - name: key_value
    type: STRING
    required: true
    description: Normalized identity key value.
