version: 2

models:
  - name: int_conversions__unioned
    description: Internal union of declared source conversion models before publishing the canonical conversions mart.
    columns:
      - name: date
        data_type: date
      - name: conversion_time
        data_type: timestamp
      - name: conversion_name
        data_type: string
      - name: conversion_id
        data_type: string
      - name: conversion_value
        data_type: float64
