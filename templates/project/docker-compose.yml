services:
  segmentstream:
    build:
      context: .
    working_dir: /workspace/.segmentstream
    volumes:
      - ..:/workspace
      - type: bind
        source: "${SEGMENTSTREAM_HOST_HOME}"
        target: /home/segmentstream/.segmentstream
        read_only: true
    environment:
      DBT_PROFILES_DIR: /workspace/.segmentstream
      GOOGLE_APPLICATION_CREDENTIALS: /home/segmentstream/.segmentstream/gcloud/application_default_credentials.json
      SEGMENTSTREAM_BQ_PROJECT: "${SEGMENTSTREAM_BQ_PROJECT}"
      SEGMENTSTREAM_BQ_DATASET: "${SEGMENTSTREAM_BQ_DATASET}"
      SEGMENTSTREAM_BQ_LOCATION: "${SEGMENTSTREAM_BQ_LOCATION}"
    ports:
      - "3000:3000"
    command:
      - dagster
      - dev
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --python-file
      - dagster/definitions.py
