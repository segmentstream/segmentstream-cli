version: 2

models:
  - name: events___SOURCE_NAME__
    description: Canonical event stream exported by the __SOURCE_NAME__ source.
    config:
      tags:
        - segmentstream_source
        - segmentstream_export
      meta:
        segmentstream:
          source_name: __SOURCE_NAME__
          export_name: events
          contract: events_v1
    columns:
      - name: event_id
        description: Stable event identifier from the upstream source.
        data_tests:
          - not_null
      - name: anonymous_id
        description: Anonymous user or device identifier.
      - name: event_name
        description: Event name.
      - name: page_url
        description: Page URL associated with the event when available.
      - name: page_referrer
        description: Referrer URL associated with the event when available.
      - name: event_timestamp
        description: Event timestamp in UTC.
      - name: event_date
        description: Date partition for this exported event row.
