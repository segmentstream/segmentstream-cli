version: 2

unit_tests:
  - name: int_identity_anonymous_id_first_seen__uses_earliest_identity_key_date
    model: int_identity_anonymous_id_first_seen
    given:
      - input: ref('segmentstream_analytics_core', 'identity_keys')
        format: sql
        rows: |
          select 'web' as segmentstream_source, date '2026-01-03' as date, 'anon_1' as anonymous_id, 'ip_address' as key_name, '203.0.113.1' as key_value
          union all
          select 'web' as segmentstream_source, date '2026-01-01' as date, 'anon_1' as anonymous_id, 'user_id' as key_name, 'user_1' as key_value
          union all
          select 'web' as segmentstream_source, date '2026-01-02' as date, 'anon_2' as anonymous_id, 'user_id' as key_name, 'user_2' as key_value
    expect:
      rows:
        - anonymous_id: anon_1
          first_seen_date: "2026-01-01"
        - anonymous_id: anon_2
          first_seen_date: "2026-01-02"
