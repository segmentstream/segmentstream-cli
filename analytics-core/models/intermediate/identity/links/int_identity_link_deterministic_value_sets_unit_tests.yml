version: 2

unit_tests:
  - name: int_identity_link_deterministic_value_sets__ignores_probabilistic_keys
    model: int_identity_link_deterministic_value_sets
    given:
      - input: ref('int_identity_link_key_observations')
        format: sql
        rows: |
          select 'web' as segmentstream_source, '__segmentstream_project__' as scope_value, 'project' as scope, 'anon_1' as anonymous_id, date '2026-01-01' as date, 'user_id' as key_name, 'user_b' as key_value, 'deterministic' as tier, 180 as window_days, 1000 as max_distinct_anonymous_ids
          union all
          select 'web' as segmentstream_source, '__segmentstream_project__' as scope_value, 'project' as scope, 'anon_1' as anonymous_id, date '2026-01-02' as date, 'user_id' as key_name, 'user_a' as key_value, 'deterministic' as tier, 180 as window_days, 1000 as max_distinct_anonymous_ids
          union all
          select 'web' as segmentstream_source, 'web' as scope_value, 'source' as scope, 'anon_1' as anonymous_id, date '2026-01-01' as date, 'ip_address' as key_name, '203.0.113.1' as key_value, 'probabilistic' as tier, 3 as window_days, 100 as max_distinct_anonymous_ids
    expect:
      rows:
        - scope: project
          scope_value: __segmentstream_project__
          key_name: user_id
          anonymous_id: anon_1
          key_value_set: '["user_a","user_b"]'
