version: 2

unit_tests:
  - name: identity_keys__deduplicates_unioned_keys
    model: identity_keys
    given:
      - input: ref('int_identity_keys__daily_spans')
        format: sql
        rows: |
          select 'web' as segmentstream_source, date '2026-01-01' as date, 'anon_1' as anonymous_id, 'ip_address' as key_name, '203.0.113.1' as key_value, timestamp('2026-01-01 08:00:00+00') as daily_first_observed_at, timestamp('2026-01-01 09:00:00+00') as daily_last_observed_at
          union all
          select 'web' as segmentstream_source, date '2026-01-01' as date, 'anon_1' as anonymous_id, 'ip_address' as key_name, '203.0.113.1' as key_value, timestamp('2026-01-01 08:00:00+00') as daily_first_observed_at, timestamp('2026-01-01 09:00:00+00') as daily_last_observed_at
    expect:
      rows:
        - segmentstream_source: web
          date: "2026-01-01"
          anonymous_id: anon_1
          key_name: ip_address
          key_value: 203.0.113.1
          daily_first_observed_at: "2026-01-01 08:00:00+00"
          daily_last_observed_at: "2026-01-01 09:00:00+00"
