version: 2

# Example raw input declaration for this source package.
# Replace these placeholders with the warehouse tables this source reads from.
# For BigQuery, database is the project, schema is the dataset, and identifier
# is the physical table name. Add or remove tables as needed, then reference
# them from models/events.sql.
sources:
  - name: __SOURCE_NAME___raw
    description: REPLACE_WITH_RAW_INPUT_DESCRIPTION
    database: REPLACE_WITH_RAW_BIGQUERY_PROJECT
    schema: REPLACE_WITH_RAW_BIGQUERY_DATASET
    tables:
      - name: events
        identifier: REPLACE_WITH_RAW_EVENTS_TABLE
        description: REPLACE_WITH_RAW_TABLE_DESCRIPTION

models:
  - name: events
    description: Canonical event stream emitted by the __SOURCE_NAME__ source.
    config:
      tags:
        - segmentstream_source
      meta:
        segmentstream:
          source_name: __SOURCE_NAME__
          contract:
            type: events
            schema_version: 1
    columns:
      - name: event_id
        description: Stable event identifier from the upstream source.
      - name: anonymous_id
        description: Anonymous user or device identifier.
      - name: event_name
        description: Event name.
      - name: page_url
        description: Page URL associated with the event when available.
      - name: page_referrer
        description: Referrer URL associated with the event when available.
      - name: event_timestamp
        description: Event timestamp in UTC.
      - name: event_date
        description: Date partition for this event row.
